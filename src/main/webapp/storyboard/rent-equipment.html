<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Rent Equipment - E-Sukan</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f5f5f5; margin: 0; padding: 0; }
        .navbar { background: #667eea; padding: 15px 30px; color: white; }
        .container { max-width: 500px; margin: 30px auto; background: white; padding: 20px; border-radius: 10px; }
        h1 { color: #333; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, select { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 5px; }
        button { background: #28a745; color: white; padding: 10px; border: none; border-radius: 5px; cursor: pointer; }
        .btn { background: #667eea; color: white; padding: 10px 20px; text-decoration: none; border-radius: 5px; display: inline-block; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="navbar"><strong>E-Sukan</strong> - Rent Equipment</div>
    <div class="container">
        <h1>Rent Equipment (Mockup)</h1>
        <form>
            <div class="form-group"><label>Equipment:</label><select><option>Badminton Racket</option></select></div>
            <div class="form-group"><label>Quantity:</label><input type="number" value="1"></div>
            <div class="form-group"><label>Rental Days:</label><input type="number" value="3"></div>
            <button type="button">Calculate Total</button>
        </form>
        <a href="index.html" class="btn">Back to Navigation</a>
    </div>
</body>
</html>
