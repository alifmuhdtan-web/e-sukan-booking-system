<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Payment - E-Sukan</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f5f5f5; margin: 0; padding: 0; }
        .navbar { background: #667eea; padding: 15px 30px; color: white; }
        .container { max-width: 500px; margin: 30px auto; background: white; padding: 20px; border-radius: 10px; }
        h1 { color: #333; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 5px; }
        button { background: #28a745; color: white; padding: 10px; border: none; border-radius: 5px; cursor: pointer; width: 100%; }
        .btn { background: #667eea; color: white; padding: 10px 20px; text-decoration: none; border-radius: 5px; display: inline-block; margin-top: 20px; text-align: center; }
    </style>
</head>
<body>
    <div class="navbar"><strong>E-Sukan</strong> - Payment</div>
    <div class="container">
        <h1>Payment (Mockup)</h1>
        <div class="form-group"><label>Card Number:</label><input type="text" placeholder="1234 5678 9012 3456"></div>
        <div class="form-group"><label>Expiry Date:</label><input type="text" placeholder="MM/YY"></div>
        <div class="form-group"><label>CVV:</label><input type="text" placeholder="123"></div>
        <button type="button">Pay RM 30.00</button>
        <a href="index.html" class="btn" style="display: block; margin-top: 20px;">Back to Navigation</a>
    </div>
</body>
</html>
