<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - E-Sukan Storyboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; justify-content: center; align-items: center; }
        .login-container { background: white; border-radius: 10px; width: 400px; padding: 40px; box-shadow: 0 15px 35px rgba(0,0,0,0.2); }
        h1 { text-align: center; color: #667eea; margin-bottom: 10px; }
        .subtitle { text-align: center; color: #666; margin-bottom: 30px; font-size: 14px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 5px; color: #555; font-weight: 500; }
        input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 5px; font-size: 14px; }
        button { width: 100%; padding: 12px; background: #667eea; border: none; border-radius: 5px; color: white; font-size: 16px; font-weight: bold; cursor: pointer; }
        button:hover { background: #5a67d8; }
        .register-link { text-align: center; margin-top: 20px; color: #666; }
        .register-link a { color: #667eea; text-decoration: none; }
        .demo-box { background: #f7fafc; padding: 15px; border-radius: 5px; margin-top: 20px; font-size: 12px; }
        .nav-links { text-align: center; margin-top: 20px; }
        .nav-links a { color: #667eea; text-decoration: none; margin: 0 10px; }
    </style>
</head>
<body>
    <div class="login-container">
        <h1>E-Sukan</h1>
        <p class="subtitle">Campus Facility & Equipment Booking System</p>
        
        <form>
            <div class="form-group">
                <label>Username</label>
                <input type="text" placeholder="Enter your username">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" placeholder="Enter your password">
            </div>
            <button type="button">Login</button>
        </form>
        
        <div class="register-link">
            Don't have an account? <a href="register.html">Register here</a>
        </div>
        
        <div class="demo-box">
            <strong>Demo Credentials:</strong><br>
            Admin: admin / password123<br>
            Manager: manager_ahmad / password123<br>
            Student: student_ali / password123
        </div>
        
        <div class="nav-links">
            <a href="index.html">Back to Navigation</a>
        </div>
    </div>
</body>
</html>
