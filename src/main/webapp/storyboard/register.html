<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register - E-Sukan Storyboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 40px 20px; }
        .register-container { background: white; border-radius: 10px; max-width: 500px; margin: 0 auto; padding: 40px; box-shadow: 0 15px 35px rgba(0,0,0,0.2); }
        h1 { text-align: center; color: #667eea; margin-bottom: 30px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; color: #555; font-weight: 500; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; font-size: 14px; }
        .row { display: flex; gap: 15px; }
        .row .form-group { flex: 1; }
        button { width: 100%; padding: 12px; background: #667eea; border: none; border-radius: 5px; color: white; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .login-link { text-align: center; margin-top: 20px; color: #666; }
        .login-link a { color: #667eea; text-decoration: none; }
        .required-field { color: red; }
        small { color: #666; font-size: 11px; }
        .nav-links { text-align: center; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="register-container">
        <h1>Create Account</h1>
        
        <form>
            <div class="form-group">
                <label>Username <span class="required-field">*</span></label>
                <input type="text" placeholder="At least 3 characters" required>
                <small>Username must be unique and at least 3 characters</small>
            </div>
            
            <div class="form-group">
                <label>Email <span class="required-field">*</span></label>
                <input type="email" placeholder="your@email.com" required>
                <small>Valid email address required</small>
            </div>
            
            <div class="row">
                <div class="form-group">
                    <label>Password <span class="required-field">*</span></label>
                    <input type="password" placeholder="At least 6 characters" required>
                    <small>Minimum 6 characters</small>
                </div>
                <div class="form-group">
                    <label>Confirm Password <span class="required-field">*</span></label>
                    <input type="password" placeholder="Re-enter password" required>
                </div>
            </div>
            
            <div class="form-group">
                <label>Full Name <span class="required-field">*</span></label>
                <input type="text" placeholder="Your full name" required>
            </div>
            
            <div class="row">
                <div class="form-group">
                    <label>Phone Number <span class="required-field">*</span></label>
                    <input type="tel" placeholder="0123456789" required>
                    <small>10-11 digits</small>
                </div>
                <div class="form-group">
                    <label>Matric Number (Students)</label>
                    <input type="text" placeholder="e.g., A123456">
                </div>
            </div>
            
            <div class="form-group">
                <label>Account Type</label>
                <select>
                    <option>Student</option>
                    <option>Facility Manager</option>
                </select>
            </div>
            
            <button type="button">Register</button>
        </form>
        
        <div class="login-link">
            Already have an account? <a href="login.html">Login here</a>
        </div>
        
        <div class="nav-links">
            <a href="index.html">Back to Navigation</a>
        </div>
    </div>
</body>
</html>
